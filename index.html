<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>THE Deepak Vocabulary App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', 'Segoe UI', Roboto, sans-serif;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #0d0614;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
    }

    /* 📱 Responsive Mobile Container */
    #mobile-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      height: 100dvh; /* dynamic height fix for mobile browsers */
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 20px 50px rgba(124, 58, 237, 0.35), 0 0 0 8px #1f1133;
      overflow: hidden;
    }

    @media (min-width: 450px) {
      #mobile-container {
        border-radius: 36px;
        height: 92vh;
        max-height: 880px;
      }
    }

    /* 1. स्प्लैश स्क्रीन */
    #splash-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(165deg, #a855f7, #7c3aed, #4c1d95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      text-align: center;
      padding: 20px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .panda-logo {
      width: 120px;
      height: 120px;
      background: #ffffff;
      border-radius: 30px; /* Squircle Look */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      margin-bottom: 20px;
      animation: bouncePanda 1.4s infinite alternate ease-in-out;
    }

    @keyframes bouncePanda {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-16px) scale(1.05); }
    }

    .splash-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #ffffff;
    }

    /* 2. टॉप स्टैट्स बार (Fixed Header) */
    .top-stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 2px solid #f0e6ff;
      background: #ffffff;
      z-index: 30;
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 900;
      font-size: 16px;
      color: #4b5563;
    }

    .stat-item.flag { font-size: 24px; }
    .stat-item.streak { color: #f59e0b; }
    .stat-item.gems { color: #8b5cf6; }

    /* स्क्रॉल एरिया */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      padding-bottom: 85px;
      background: #ffffff;
      scroll-behavior: smooth;
    }

    /* 3. पर्पल सेक्शन बैनर */
    .section-banner {
      background: #7c3aed;
      border-radius: 20px;
      padding: 16px 20px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 0 #5b21b6;
      margin-bottom: 25px;
      border: 2px solid #6d28d9;
    }

    .banner-text h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #ddd6fe;
      font-weight: 800;
    }

    .banner-text h1 {
      font-size: 16px;
      margin-top: 4px;
      font-weight: 900;
      line-height: 1.3;
    }

    .banner-logo {
      width: 48px;
      height: 48px;
      background: #ffffff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 0 #5b21b6;
      flex-shrink: 0;
    }

    /* 4. DUOLINGO STYLE PATH LAYOUT */
    .path-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding-bottom: 30px;
      position: relative;
    }

    .path-node-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 5;
    }

    /* 🔲 3D Square / Box Level Node Buttons */
    .path-node {
      width: 76px;
      height: 76px;
      border-radius: 22px; /* Square/Box style rounded corners */
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    /* Unlocked / Completed Nodes */
    .path-node.unlocked {
      background: #8b5cf6;
      border: 3px solid #a855f7;
      box-shadow: 0 7px 0 #6d28d9, 0 8px 15px rgba(139, 92, 246, 0.3);
      color: white;
    }

    .path-node.unlocked:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #6d28d9;
    }

    /* Active Level Outer Ring Effect */
    .path-node.current-active {
      position: relative;
      background: #7c3aed !important;
      border: 3px solid #a855f7 !important;
      box-shadow: 0 7px 0 #5b21b6 !important;
    }

    .path-node.current-active::after {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border-radius: 28px;
      border: 3.5px solid #a855f7;
      animation: pulseRing 1.6s infinite ease-out;
    }

    @keyframes pulseRing {
      0% { transform: scale(0.95); opacity: 1; }
      100% { transform: scale(1.15); opacity: 0; }
    }

    /* Chest & Gift Nodes */
    .path-node.gift-node {
      background: #f59e0b !important;
      border: 3px solid #fbbf24 !important;
      box-shadow: 0 7px 0 #b45309 !important;
      animation: giftBounce 1.4s infinite alternate ease-in-out;
    }

    @keyframes giftBounce {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }

    /* Locked Nodes */
    .path-node.locked {
      background: #e5e7eb;
      border: 3px solid #f3f4f6;
      box-shadow: 0 7px 0 #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
    }

    /* S-Curve Offsets */
    .offset-0 { transform: translateX(0px); }
    .offset-1 { transform: translateX(-40px); }
    .offset-2 { transform: translateX(-65px); }
    .offset-3 { transform: translateX(-40px); }
    .offset-4 { transform: translateX(0px); }
    .offset-5 { transform: translateX(40px); }
    .offset-6 { transform: translateX(65px); }
    .offset-7 { transform: translateX(40px); }

    /* Mascot */
    .path-mascot {
      font-size: 42px;
      margin: -6px 0;
      animation: floatPanda 2s infinite alternate ease-in-out;
    }

    @keyframes floatPanda {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }

    /* 5. क्विज UI */
    .quiz-card {
      text-align: center;
      padding-top: 10px;
    }

    .word-card-box {
      background: #ffffff;
      border-radius: 20px;
      padding: 20px 16px;
      margin: 16px 0;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.08);
      border: 2px solid #f0e6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .word-display {
      font-size: 28px;
      color: #2e1065;
      font-weight: 900;
    }

    .speaker-btn {
      background: #f0e6ff;
      border: none;
      font-size: 20px;
      padding: 10px 14px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 0 #ddd6fe;
    }

    .speaker-btn:active { transform: scale(0.92); }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      background: #ffffff;
      border: 2px solid #e5e7eb;
      box-shadow: 0 5px 0 #e5e7eb;
      padding: 14px;
      border-radius: 18px;
      font-size: 17px;
      font-weight: 800;
      color: #374151;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s ease;
    }

    .option-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #e5e7eb;
    }

    .option-btn.correct-btn {
      background: #22c55e !important;
      border-color: #16a34a !important;
      color: #ffffff !important;
      box-shadow: 0 5px 0 #15803d !important;
    }

    .option-btn.wrong-btn {
      background: #ef4444 !important;
      border-color: #dc2626 !important;
      color: #ffffff !important;
      box-shadow: 0 5px 0 #b91c1c !important;
    }

    .quiz-progress-bg {
      width: 100%;
      height: 12px;
      background: #f3f4f6;
      border-radius: 10px;
      overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%;
      background: #7c3aed;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 10px;
    }

    .continue-btn {
      margin-top: 16px;
      width: 100%;
      background: #7c3aed;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 18px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 0 #5b21b6;
      display: none;
    }

    .continue-btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 #5b21b6;
    }

    /* 🏆 जीत की स्क्रीन */
    .level-complete-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 10px;
    }

    .trophy-icon {
      font-size: 80px;
      margin-bottom: 10px;
    }

    .purple-ribbon {
      background: #7c3aed;
      color: white;
      font-size: 24px;
      font-weight: 900;
      padding: 10px 30px;
      border-radius: 18px;
      box-shadow: 0 6px 0 #5b21b6;
      margin-bottom: 15px;
    }

    .reward-badge {
      font-size: 16px;
      font-weight: 900;
      color: #7c3aed;
      background: #f0e6ff;
      padding: 8px 20px;
      border-radius: 30px;
      margin-bottom: 20px;
    }

    .next-level-btn-green {
      width: 100%;
      background: #22c55e;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 20px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 #15803d;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .next-level-btn-green:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #15803d;
    }

    /* 6. FIXED BOTTOM NAVIGATION BAR */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65px;
      background: #ffffff;
      border-top: 2px solid #f0e6ff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 30;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      font-size: 24px;
      cursor: pointer;
      border-radius: 14px;
      transition: all 0.2s ease;
    }

    .nav-item.active {
      background: #f0e6ff;
      border: 2px solid #d8b4fe;
      transform: translateY(-2px);
    }

    /* कंफ़ेट्टी कैनवास */
    #confetti-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 90;
    }
  </style>
</head>
<body>

  <div id="mobile-container">
    <canvas id="confetti-canvas"></canvas>
    
    <!-- 1. स्प्लैश स्क्रीन -->
    <div id="splash-screen">
      <div class="panda-logo">🐼</div>
      <div class="splash-title">THE Deepak Vocabulary</div>
    </div>

    <!-- 2. टॉप स्टैट्स बार -->
    <div class="top-stats-bar">
      <div class="stat-item flag">🇮🇳</div>
      <div class="stat-item streak">🔥 <span id="streak-val">0</span></div>
      <div class="stat-item gems">💎 <span id="score-val">0</span></div>
    </div>

    <!-- मुख्य कंटेंट बॉडी -->
    <div class="main-content" id="app"></div>

    <!-- 3. बॉटम नेविगेशन -->
    <div class="bottom-nav">
      <div class="nav-item active" onclick="loadLevelScreen()">🏠</div>
      <div class="nav-item" onclick="alert('📦 चेस्ट/स्टोर जल्द आ रहा है!')">🎁</div>
      <div class="nav-item" onclick="alert('🏆 लीडरबोर्ड जल्द उपलब्ध होगा!')">🏆</div>
      <div class="nav-item" onclick="alert('👤 प्रोफाइल सेटिंग्स')">👤</div>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      // स्प्लैश स्क्रीन
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
      }, 2000);

      // Vocab List Data
      const masterVocabList = [
        { en: "Apple", hi: "सेब" }, { en: "Book", hi: "किताब" }, { en: "Cat", hi: "बिल्ली" }, { en: "Dog", hi: "कुत्ता" }, { en: "Water", hi: "पानी" },
        { en: "Good", hi: "अच्छा" }, { en: "Happy", hi: "खुश" }, { en: "House", hi: "घर" }, { en: "Eat", hi: "खाना" }, { en: "Flower", hi: "फूल" },
        { en: "Sun", hi: "सूरज" }, { en: "Moon", hi: "चांद" }, { en: "Tree", hi: "पेड़" }, { en: "Milk", hi: "दूध" }, { en: "Friend", hi: "दोस्त" },
        { en: "Boy", hi: "लड़का" }, { en: "Girl", hi: "लड़की" }, { en: "Mother", hi: "मां" }, { en: "Father", hi: "पिता" }, { en: "School", hi: "स्कूल" },
        { en: "Beautiful", hi: "सुंदर" }, { en: "Money", hi: "पैसा" }, { en: "Family", hi: "परिवार" }, { en: "Country", hi: "देश" }, { en: "Health", hi: "स्वास्थ्य" },
        { en: "Ambition", hi: "महत्वाकांक्षा" }, { en: "Develop", hi: "विकसित करना" }, { en: "Opportunity", hi: "अवसर" }, { en: "Leadership", hi: "नेतृत्व" }, { en: "Knowledge", hi: "ज्ञान" }
      ];

      const allHindiMeanings = masterVocabList.map(v => v.hi);

      function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }

      function generateOptions(correctAnswer) {
        let options = [correctAnswer];
        while (options.length < 4) {
          let randomMeaning = allHindiMeanings[Math.floor(Math.random() * allHindiMeanings.length)];
          if (!options.includes(randomMeaning)) options.push(randomMeaning);
        }
        return shuffleArray(options);
      }

      // Dynamic Level Generator
      const levels = {};
      const WORDS_PER_LEVEL = 10; 
      const TOTAL_WORDS = masterVocabList.length;

      for (let levelNum = 1; levelNum <= 500; levelNum++) {
        let levelWords = [];
        for (let w = 0; w < WORDS_PER_LEVEL; w++) {
          let wordIndex = ((levelNum - 1) * WORDS_PER_LEVEL + w) % TOTAL_WORDS;
          let wordObj = masterVocabList[wordIndex];
          levelWords.push({
            en: wordObj.en,
            hi: wordObj.hi,
            options: generateOptions(wordObj.hi)
          });
        }
        levels[levelNum] = levelWords;
      }

      let currentLevel = 1;
      let currentWord = 0;
      let score = parseInt(localStorage.getItem('score')) || 0;
      let completedLevels = JSON.parse(localStorage.getItem('completedLevels')) || [];
      let streak = parseInt(localStorage.getItem('streak')) || 0;
      let lastDate = localStorage.getItem('lastDate');

      // 🔊 Speech Engine
      window.speakWord = function(text, lang = 'en-US') {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          let utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = lang;
          utterance.rate = 0.9;
          window.speechSynthesis.speak(utterance);
        }
      };

      // Sound Effects
      function playSound(type) {
        try {
          let ctx = new (window.AudioContext || window.webkitAudioContext)();
          let osc = ctx.createOscillator();
          let gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, ctx.currentTime);
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
          } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, ctx.currentTime);
            osc.frequency.setValueAtTime(110, ctx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.5, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            osc.start();
            osc.stop(ctx.currentTime + 0.35);
          }
        } catch (e) {}
      }

      function updateStats() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('streak-val').innerText = streak;
      }

      function checkStreak() {
        let today = new Date().toDateString();
        if (lastDate !== today) {
          let yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          if (lastDate === yesterday.toDateString()) {
            streak++;
          } else {
            streak = 1;
          }
          localStorage.setItem('lastDate', today);
          localStorage.setItem('streak', streak);
        }
      }

      // होम लेवल्स पाथ स्क्रीन
      window.loadLevelScreen = function() {
        checkStreak();
        updateStats();

        let pathHtml = `
          <div class="section-banner">
            <div class="banner-text">
              <h3>SECTION 1 • 500 LEVELS</h3>
              <h1>THE Deepak Vocabulary</h1>
            </div>
            <div class="banner-logo">🐼</div>
          </div>
          <div class="path-container">
        `;

        for (let lvl = 1; lvl <= 500; lvl++) {
          let isUnlocked = (lvl === 1) || completedLevels.includes(lvl - 1);
          let isCurrent = isUnlocked && !completedLevels.includes(lvl);
          let offsetClass = `offset-${lvl % 8}`;
          let isGift = (lvl % 5 === 0);

          let nodeIcon = '🔒';
          if (isUnlocked) {
            if (completedLevels.includes(lvl)) {
              nodeIcon = '⭐';
            } else if (isGift) {
              nodeIcon = '🎁';
            } else {
              nodeIcon = '⭐';
            }
          }

          if (lvl % 6 === 3) {
            pathHtml += `<div class="path-mascot ${offsetClass}">🐼</div>`;
          }

          pathHtml += `
            <div class="path-node-wrapper ${offsetClass}">
              <div id="level-node-${lvl}" class="path-node ${isUnlocked ? 'unlocked' : 'locked'} ${isGift && isUnlocked ? 'gift-node' : ''} ${isCurrent ? 'current-active' : ''}" onclick="startLevel(${lvl}, ${isUnlocked})">
                ${nodeIcon}
              </div>
            </div>
          `;
        }

        pathHtml += `</div>`;
        document.getElementById('app').innerHTML = pathHtml;

        setTimeout(() => {
          let activeNode = document.querySelector('.current-active');
          if (activeNode) {
            activeNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }, 100);
      };

      window.startLevel = function(level, isUnlocked) {
        if (!isUnlocked) {
          playSound('wrong');
          alert(`🔒 Level ${level} लॉक है! पिछला लेवल पूरा करें।`);
          return;
        }
        currentLevel = level;
        currentWord = 0;
        loadWord();
      };

      function loadWord() {
        let wordData = levels[currentLevel][currentWord];
        let progress = (currentWord / levels[currentLevel].length) * 100;

        document.getElementById('app').innerHTML = `
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
            <span onclick="loadLevelScreen()" style="font-size: 22px; cursor: pointer; font-weight: bold; color: #7c3aed;">✕</span>
            <div class="quiz-progress-bg">
              <div class="quiz-progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>

          <div class="quiz-card">
            <p style="color: #7c3aed; font-weight: 800; font-size: 13px;">LEVEL ${currentLevel} • WORD ${currentWord + 1}/${levels[currentLevel].length}</p>
            
            <div class="word-card-box">
              <h1 class="word-display">${wordData.en}</h1>
              <button class="speaker-btn" onclick="speakWord('${wordData.en}')">🔊</button>
            </div>

            <div class="options-grid" id="options"></div>
            <button class="continue-btn" id="continue-btn" onclick="nextQ()">Next Question ❯</button>
          </div>
        `;

        speakWord(wordData.en);

        let optionsDiv = document.getElementById('options');
        let randomizedOptions = shuffleArray(wordData.options);

        randomizedOptions.forEach(opt => {
          let btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerText = opt;
          btn.onclick = () => checkAnswer(opt, btn, wordData.hi);
          optionsDiv.appendChild(btn);
        });
      }

      window.checkAnswer = function(selected, btn, correct) {
        let buttons = document.querySelectorAll('#options button');
        buttons.forEach(b => b.style.pointerEvents = 'none');

        speakWord(correct, 'hi-IN');

        if (selected === correct) {
          playSound('correct');
          btn.classList.add('correct-btn');
        } else {
          playSound('wrong');
          btn.classList.add('wrong-btn');

          buttons.forEach(b => {
            if (b.innerText === correct) b.classList.add('correct-btn');
          });
        }

        document.getElementById('continue-btn').style.display = 'block';
      };

      window.nextQ = function() {
        currentWord++;
        if (currentWord >= levels[currentLevel].length) {
          let isGiftLevel = (currentLevel % 5 === 0);
          let earnedGems = 5; 
          if (isGiftLevel) earnedGems += 50; 

          if (!completedLevels.includes(currentLevel)) {
            completedLevels.push(currentLevel);
            score += earnedGems;
            localStorage.setItem('score', score);
            localStorage.setItem('completedLevels', JSON.stringify(completedLevels));
          }
          
          updateStats();
          playSound('correct');
          triggerConfetti();
          showLevelSuccessScreen(earnedGems, isGiftLevel);
        } else {
          loadWord();
        }
      };

      function showLevelSuccessScreen(earnedGems, isGiftLevel) {
        document.getElementById('app').innerHTML = `
          <div class="level-complete-card">
            <div class="trophy-icon">${isGiftLevel ? '🎁' : '🏆'}</div>

            <div class="purple-ribbon">Level ${currentLevel} Complete!</div>
            <div class="reward-badge">💎 +${earnedGems} Gems Earned!</div>

            <button class="next-level-btn-green" onclick="goToNextLevel()">
              <span>Next Level</span>
              <span style="font-size: 24px;">❯</span>
            </button>
          </div>
        `;
      }

      window.goToNextLevel = function() {
        let nextLvl = currentLevel + 1;
        if (nextLvl <= 500) {
          startLevel(nextLvl, true);
        } else {
          loadLevelScreen();
        }
      };

      // कंफ़ेट्टी Blast
      function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;

        let particles = [];
        for (let i = 0; i < 65; i++) {
          particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            vx: (Math.random() - 0.5) * 12,
            vy: (Math.random() - 0.5) * 12 - 4,
            size: Math.random() * 8 + 4,
            color: ['#7c3aed', '#a855f7', '#22c55e', '#f59e0b', '#ef4444'][Math.floor(Math.random() * 5)]
          });
        }

        function render() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          });
          if (particles[0].y < canvas.height) {
            requestAnimationFrame(render);
          } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        }
        render();
      }

      loadLevelScreen();
    });
  </script>
</body>
</html>
