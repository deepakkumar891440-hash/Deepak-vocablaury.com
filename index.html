<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> welcome to THE Deepak Vocabulary.com</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
    }

    body {
      background-color: #0d0714;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #mobile-container {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 920px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.3);
      overflow: hidden;
    }

    /* 1. Splash Screen */
    #splash-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      transition: opacity 0.5s ease;
    }

    .panda-logo {
      width: 110px;
      height: 110px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      animation: bouncePanda 1.2s infinite alternate ease-in-out;
    }

    @keyframes bouncePanda {
      0% { transform: translateY(0); }
      100% { transform: translateY(-12px); }
    }

    .splash-title {
      font-size: 20px;
      font-weight: 800;
      margin-top: 20px;
      letter-spacing: 0.5px;
    }

    /* Top Stats Header */
    .top-stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 2px solid #f3e8ff;
      background: #ffffff;
      font-weight: 800;
      font-size: 15px;
      z-index: 20;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-item.streak { color: #ff9600; }
    .stat-item.gems { color: #1cb0f6; }
    .stat-item.hearts { color: #ff4b4b; }

    /* Main Scroll Area */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 90px 20px;
      background: #faf7ff;
      scroll-behavior: smooth;
    }

    /* Duolingo-style Section Banner */
    .section-banner {
      background: #7c3aed;
      border-radius: 16px;
      padding: 16px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 5px 0 #5b21b6;
      margin-bottom: 35px;
      position: relative;
    }

    .banner-text h3 {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .banner-text h1 {
      font-size: 16px;
      font-weight: 900;
      margin-top: 4px;
      line-height: 1.2;
    }

    .banner-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      padding: 10px 14px;
      border-radius: 12px;
      color: white;
      font-weight: 800;
      cursor: pointer;
      font-size: 18px;
    }

    /* Dynamic Wave / S-Curve Path Layout */
    .path-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding-bottom: 20px;
    }

    .path-node-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Realistic Duolingo-Style 3D Node Button */
    .path-node {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      cursor: pointer;
      position: relative;
      transition: all 0.1s ease;
      z-index: 2;
    }

    /* Active Unlocked Node */
    .path-node.unlocked {
      background: #7c3aed;
      box-shadow: 0 7px 0 #5b21b6;
      color: white;
    }

    .path-node.unlocked:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #5b21b6;
    }

    /* Current Active Node Pulse Ring */
    .path-node.current-active {
      background: #8b5cf6;
      box-shadow: 0 7px 0 #6d28d9;
    }

    .path-node.current-active::before {
      content: '';
      position: absolute;
      width: 86px;
      height: 86px;
      border: 4px solid #8b5cf6;
      border-radius: 50%;
      animation: pulseRing 1.5s infinite ease-in-out;
      top: -12px;
      left: -12px;
    }

    @keyframes pulseRing {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }

    /* Locked Node Style */
    .path-node.locked {
      background: #e5e7eb;
      box-shadow: 0 7px 0 #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
    }

    /* Floating Mascot Decorative Element on Path */
    .path-mascot {
      position: absolute;
      right: 40px;
      top: -10px;
      font-size: 45px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
      animation: floatMascot 2s infinite ease-in-out alternate;
    }

    @keyframes floatMascot {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }

    /* S-Curve Offsets (Realistic Wave Movement) */
    .offset-0 { transform: translateX(0px); }
    .offset-1 { transform: translateX(-48px); }
    .offset-2 { transform: translateX(-70px); }
    .offset-3 { transform: translateX(-48px); }
    .offset-4 { transform: translateX(0px); }
    .offset-5 { transform: translateX(48px); }
    .offset-6 { transform: translateX(70px); }
    .offset-7 { transform: translateX(48px); }

    /* Quiz Screen UI */
    .quiz-card { text-align: center; }
    .word-display { font-size: 36px; color: #1e1b4b; margin: 30px 0; font-weight: 900; }
    .options-grid { display: flex; flex-direction: column; gap: 12px; }

    .option-btn {
      background: #ffffff;
      border: 2px solid #e9d5ff;
      box-shadow: 0 4px 0 #e9d5ff;
      padding: 16px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      color: #4c1d95;
      cursor: pointer;
    }

    .option-btn.correct-btn {
      background: #22c55e !important;
      border-color: #16a34a !important;
      color: #ffffff !important;
      box-shadow: 0 4px 0 #15803d !important;
    }

    .option-btn.wrong-btn {
      background: #ef4444 !important;
      border-color: #dc2626 !important;
      color: #ffffff !important;
      box-shadow: 0 4px 0 #b91c1c !important;
    }

    .quiz-progress-bg {
      width: 100%; height: 12px; background: #f3e8ff; border-radius: 10px; overflow: hidden;
    }

    .quiz-progress-fill {
      height: 100%; background: #7c3aed; width: 0%; transition: width 0.3s ease;
    }

    /* Bottom Navigation Bar */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; width: 100%; height: 68px;
      background: #ffffff;
      border-top: 2px solid #f3e8ff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 20;
    }

    .nav-item {
      font-size: 24px;
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.2s ease;
    }

    .nav-item.active {
      opacity: 1;
      transform: scale(1.1);
      padding: 6px 12px;
      border: 2px solid #7c3aed;
      border-radius: 14px;
      background: #f5f3ff;
    }
  </style>
</head>
<body>

  <div id="mobile-container">
    
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="panda-logo">🐼</div>
      <div class="splash-title">Welcome  THE Deepak Vocabulary.com</div>
    </div>

    <!-- Top Bar Navigation -->
    <div class="top-stats-bar">
      <div class="stat-item">🇮🇳</div>
      <div class="stat-item streak">🔥 <span id="streak-val">6</span></div>
      <div class="stat-item gems">💎 <span id="score-val">314</span></div>
      <div class="stat-item hearts">❤️ <span id="hearts-val">5</span></div>
    </div>

    <!-- Scrollable Main Content -->
    <div class="main-content" id="app"></div>

    <!-- Duolingo-Style Bottom Nav Bar -->
    <div class="bottom-nav">
      <div class="nav-item active" onclick="loadLevelScreen()">🏠</div>
      <div class="nav-item">📦</div>
      <div class="nav-item">🏆</div>
      <div class="nav-item">❤️</div>
      <div class="nav-item">👤</div>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 500);
      }, 2000);

      const baseLevels = {
        1: [
          { en: "Apple", hi: "सेब", options: ["सेब", "केला", "आम", "अंगूर"] },
          { en: "Book", hi: "किताब", options: ["बैग", "कलम", "कॉपी", "किताब"] },
          { en: "Cat", hi: "बिल्ली", options: ["बिल्ली", "कुत्ता", "चूहा", "गाय"] }
        ]
      };

      const levels = {};
      const vocabularyPool = [
        { en: "Sun", hi: "सूरज", options: ["सूरज", "चांद", "तारा", "आकाश"] },
        { en: "Moon", hi: "चांद", options: ["चांद", "सूरज", "तारा", "हवा"] }
      ];

      for (let i = 1; i <= 500; i++) {
        levels[i] = baseLevels[i] || vocabularyPool;
      }

      let currentLevel = 1;
      let currentWord = 0;
      let score = parseInt(localStorage.getItem('score')) || 314;
      let completedLevels = JSON.parse(localStorage.getItem('completedLevels')) || [1];
      let streak = parseInt(localStorage.getItem('streak')) || 6;

      function speakWord(text) {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          let utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'hi-IN';
          window.speechSynthesis.speak(utterance);
        }
      }

      function updateStats() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('streak-val').innerText = streak;
      }

      // Render Dynamic Path Layout
      window.loadLevelScreen = function() {
        updateStats();

        let pathHtml = `
          <div class="section-banner">
            <div class="banner-text">
              <h3>SECTION 1 • 500 LEVELS</h3>
              <h1>welcome to THE Deepak vocabulary</h1>
            </div>
            <button class="banner-btn">📋</button>
          </div>

          <div class="path-container">
        `;

        for (let lvl = 1; lvl <= 500; lvl++) {
          let isUnlocked = (lvl === 1) || completedLevels.includes(lvl - 1);
          let isCurrentActive = isUnlocked && !completedLevels.includes(lvl);
          let offsetClass = `offset-${lvl % 8}`;

          // Node Icon Variations like Duolingo
          let nodeIcon = '🔒';
          if (isUnlocked) {
            if (lvl % 5 === 0) nodeIcon = '🎁';
            else if (lvl % 3 === 0) nodeIcon = '📖';
            else if (lvl % 4 === 0) nodeIcon = '🏋️';
            else nodeIcon = '⭐';
          }

          pathHtml += `
            <div class="path-node-wrapper ${offsetClass}">
              ${lvl === 3 ? '<div class="path-mascot">🐼</div>' : ''}
              <div class="path-node ${isUnlocked ? 'unlocked' : 'locked'} ${isCurrentActive ? 'current-active' : ''}" 
                   onclick="startLevel(${lvl}, ${isUnlocked})">
                ${nodeIcon}
              </div>
            </div>
          `;
        }

        pathHtml += `</div>`;
        document.getElementById('app').innerHTML = pathHtml;
      }

      window.startLevel = function(level, isUnlocked) {
        if (!isUnlocked) return;
        currentLevel = level;
        currentWord = 0;
        loadWord();
      };

      function loadWord() {
        let wordData = levels[currentLevel][currentWord];
        let progress = (currentWord / levels[currentLevel].length) * 100;

        document.getElementById('app').innerHTML = `
          <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <span onclick="loadLevelScreen()" style="font-size: 22px; cursor: pointer; font-weight: bold; color: #7c3aed;">✕</span>
            <div class="quiz-progress-bg">
              <div class="quiz-progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>

          <div class="quiz-card">
            <p style="color: #7c3aed; font-weight: 800; font-size: 13px;">LEVEL ${currentLevel}</p>
            <h1 class="word-display">${wordData.en}</h1>
            <div class="options-grid" id="options"></div>
          </div>
        `;

        let optionsDiv = document.getElementById('options');
        wordData.options.forEach(opt => {
          let btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerText = opt;
          btn.onclick = () => checkAnswer(opt, btn, wordData.hi);
          optionsDiv.appendChild(btn);
        });
      }

      window.checkAnswer = function(selected, btn, correct) {
        speakWord(correct);
        if (selected === correct) {
          score += 10;
          btn.classList.add('correct-btn');
          setTimeout(() => { nextQ(); }, 1000);
        } else {
          btn.classList.add('wrong-btn');
          setTimeout(() => { nextQ(); }, 1400);
        }
        localStorage.setItem('score', score);
        updateStats();
      };

      function nextQ() {
        currentWord++;
        if (currentWord >= levels[currentLevel].length) {
          if (!completedLevels.includes(currentLevel)) {
            completedLevels.push(currentLevel);
            localStorage.setItem('completedLevels', JSON.stringify(completedLevels));
          }
          loadLevelScreen();
        } else {
          loadWord();
        }
      }

      loadLevelScreen();
    });
  </script>
</body>
</html>
