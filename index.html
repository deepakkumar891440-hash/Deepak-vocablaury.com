<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepak Vocabulary - 500 Levels</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Feather', 'Nunito', sans-serif, Arial;
    }

    body {
      background-color: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* मोबाइल कंटेनर */
    #mobile-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 850px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      border-radius: 16px;
    }

    /* 1. टॉप स्टैट्स बार */
    .top-stats-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 10px;
      border-bottom: 2px solid #e5e5e5;
      background: #fff;
      font-weight: 800;
      font-size: 15px;
      z-index: 10;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-item.flag { font-size: 20px; }
    .stat-item.streak { color: #ff9600; }
    .stat-item.gems { color: #1cb0f6; }
    .stat-item.hearts { color: #ff4b4b; }

    /* स्क्रॉल होने वाला पाथ एरिया */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      padding-bottom: 80px;
    }

    /* 2. वेलकम बैनर */
    .section-banner {
      background: #58cc02;
      border-radius: 16px;
      padding: 16px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 0 #46a302;
      margin-bottom: 25px;
    }

    .banner-text h3 {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.9;
      letter-spacing: 0.8px;
    }

    .banner-text h1 {
      font-size: 17px;
      margin-top: 4px;
      font-weight: 800;
    }

    .banner-logo {
      width: 45px;
      height: 45px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 0 #e5e5e5;
    }

    .banner-logo img {
      width: 35px;
      height: 35px;
      object-fit: contain;
    }

    /* 3. 500 लेवल्स वाला Duolingo Path Layout */
    .path-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 10px;
    }

    .path-node-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .path-node {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s;
    }

    .path-node.unlocked {
      background: #58cc02;
      box-shadow: 0 7px 0 #46a302;
      color: white;
    }

    .path-node.unlocked:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #46a302;
    }

    .path-node.locked {
      background: #e5e5e5;
      box-shadow: 0 7px 0 #afafaf;
      color: #afafaf;
      cursor: not-allowed;
    }

    .level-label {
      font-size: 11px;
      font-weight: 800;
      color: #777;
      margin-top: 4px;
    }

    /* Wave Path Pattern (Zig-Zag Offset) */
    .offset-0 { transform: translateX(0px); }
    .offset-1 { transform: translateX(-35px); }
    .offset-2 { transform: translateX(-50px); }
    .offset-3 { transform: translateX(-35px); }
    .offset-4 { transform: translateX(0px); }
    .offset-5 { transform: translateX(35px); }
    .offset-6 { transform: translateX(50px); }
    .offset-7 { transform: translateX(35px); }

    /* क्विज स्टाइल */
    .quiz-card {
      text-align: center;
    }

    .word-display {
      font-size: 34px;
      color: #3c3c3c;
      margin: 25px 0;
      font-weight: 800;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option-btn {
      background: #ffffff;
      border: 2px solid #e5e5e5;
      box-shadow: 0 4px 0 #e5e5e5;
      padding: 15px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      color: #4b4b4b;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }

    .option-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #e5e5e5;
    }

    .quiz-progress-bg {
      width: 100%;
      height: 12px;
      background: #e5e5e5;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0 20px 0;
    }

    .quiz-progress-fill {
      height: 100%;
      background: #58cc02;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 10px;
    }

    /* 4. बॉटम नेविगेशन बार */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: white;
      border-top: 2px solid #e5e5e5;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 10;
    }

    .nav-item {
      font-size: 22px;
      cursor: pointer;
      opacity: 0.6;
    }

    .nav-item.active {
      opacity: 1;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div id="mobile-container">
    
    <!-- 1. टॉप बार -->
    <div class="top-stats-bar">
      <div class="stat-item flag">🇮🇳</div>
      <div class="stat-item streak">🔥 <span id="streak-val">0</span></div>
      <div class="stat-item gems">💎 <span id="score-val">0</span></div>
      <div class="stat-item hearts">❤️ 5</div>
    </div>

    <!-- मुख्य स्क्रॉलिंग कंटेंट -->
    <div class="main-content" id="app"></div>

    <!-- 4. बॉटम नेविगेशन बार -->
    <div class="bottom-nav">
      <div class="nav-item active" onclick="loadLevelScreen()">🏠</div>
      <div class="nav-item">📦</div>
      <div class="nav-item">🏆</div>
      <div class="nav-item">❤️</div>
      <div class="nav-item">👤</div>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      // Base levels (1, 2, 3)
      const baseLevels = {
        1: [
          { en: "Apple", hi: "सेब", options: ["सेब", "केला", "आम", "अंगूर"] },
          { en: "Book", hi: "किताब", options: ["किताब", "कलम", "कॉपी", "बैग"] },
          { en: "Cat", hi: "बिल्ली", options: ["बिल्ली", "कुत्ता", "चूहा", "गाय"] },
          { en: "Dog", hi: "कुत्ता", options: ["कुत्ता", "बिल्ली", "घोड़ा", "शेर"] },
          { en: "Water", hi: "पानी", options: ["पानी", "चाय", "दूध", "जूस"] },
          { en: "Good", hi: "अच्छा", options: ["अच्छा", "बुरा", "सुंदर", "गंदा"] },
          { en: "Happy", hi: "खुश", options: ["खुश", "उदास", "गुस्सा", "डरा"] },
          { en: "House", hi: "घर", options: ["घर", "दुकान", "स्कूल", "अस्पताल"] },
          { en: "Eat", hi: "खाना", options: ["खाना", "पीना", "सोना", "खेलना"] },
          { en: "Flower", hi: "फूल", options: ["फूल", "पत्ता", "पेड़", "फल"] }
        ],
        2: [
          { en: "Beautiful", hi: "सुंदर", options: ["सुंदर", "बदसूरत", "छोटा", "बड़ा"] },
          { en: "Friend", hi: "दोस्त", options: ["दोस्त", "दुश्मन", "शिक्षक", "डॉक्टर"] },
          { en: "Money", hi: "पैसा", options: ["पैसा", "समय", "काम", "नाम"] },
          { en: "Family", hi: "परिवार", options: ["परिवार", "समाज", "देश", "दुनिया"] },
          { en: "Country", hi: "देश", options: ["देश", "शहर", "गांव", "राज्य"] },
          { en: "Health", hi: "स्वास्थ्य", options: ["स्वास्थ्य", "बीमारी", "दवा", "डॉक्टर"] },
          { en: "Education", hi: "शिक्षा", options: ["शिक्षा", "खेल", "नौकरी", "व्यापार"] },
          { en: "Travel", hi: "यात्रा", options: ["यात्रा", "घर", "खाना", "सोना"] },
          { en: "Success", hi: "सफलता", options: ["सफलता", "असफलता", "मेहनत", "भाग्य"] },
          { en: "Problem", hi: "समस्या", options: ["समस्या", "समाधान", "सवाल", "जवाब"] }
        ],
        3: [
          { en: "Ambition", hi: "महत्वाकांक्षा", options: ["महत्वाकांक्षा", "आलस्य", "डर", "खुशी"] },
          { en: "Develop", hi: "विकसित करना", options: ["विकसित करना", "खराब करना", "बनाना", "तोड़ना"] },
          { en: "Environment", hi: "पर्यावरण", options: ["पर्यावरण", "प्रदूषण", "जंगल", "नदी"] },
          { en: "Technology", hi: "प्रौद्योगिकी", options: ["प्रौद्योगिकी", "विज्ञान", "कला", "इतिहास"] },
          { en: "Opportunity", hi: "अवसर", options: ["अवसर", "समस्या", "चुनौती", "हार"] },
          { en: "Responsibility", hi: "जिम्मेदारी", options: ["जिम्मेदारी", "आजादी", "अधिकार", "कानून"] },
          { en: "Globalization", hi: "वैश्वीकरण", options: ["वैश्वीकरण", "स्थानीयकरण", "विकास", "पतन"] },
          { en: "Innovation", hi: "नवाचार", options: ["नवाचार", "नकल", "परंपरा", "रिवाज"] },
          { en: "Sustainable", hi: "टिकाऊ", options: ["टिकाऊ", "नाजुक", "मजबूत", "कमजोर"] },
          { en: "Leadership", hi: "नेतृत्व", options: ["नेतृत्व", "अनुसरण", "टीम", "कंपनी"] }
        ]
      };

      // 500 लेवल्स जनरेट करने का फ़ंक्शन
      const levels = {};
      const vocabularyPool = [
        { en: "Sun", hi: "सूरज", options: ["सूरज", "चांद", "तारा", "आकाश"] },
        { en: "Moon", hi: "चांद", options: ["चांद", "सूरज", "तारा", "हवा"] },
        { en: "Time", hi: "समय", options: ["समय", "काम", "दिन", "रात"] },
        { en: "City", hi: "शहर", options: ["शहर", "गांव", "देश", "राज्य"] },
        { en: "Love", hi: "प्यार", options: ["प्यार", "नफरत", "गुस्सा", "डर"] },
        { en: "Peace", hi: "शांति", options: ["शांति", "शोर", "युद्ध", "दुख"] },
        { en: "Freedom", hi: "आजादी", options: ["आजादी", "गुलामी", "कानून", "नियम"] },
        { en: "Wisdom", hi: "बुद्धिमत्ता", options: ["बुद्धिमत्ता", "मूर्खता", "ज्ञान", "सोच"] },
        { en: "Courage", hi: "साहस", options: ["साहस", "डर", "कायरता", "शक्ति"] },
        { en: "Truth", hi: "सत्य", options: ["सत्य", "झूठ", "पाप", "पुण्य"] }
      ];

      for (let i = 1; i <= 500; i++) {
        if (baseLevels[i]) {
          levels[i] = baseLevels[i];
        } else {
          levels[i] = vocabularyPool;
        }
      }

      let currentLevel = 1;
      let currentWord = 0;
      let score = parseInt(localStorage.getItem('score')) || 0;
      let completedLevels = JSON.parse(localStorage.getItem('completedLevels')) || [];
      let streak = parseInt(localStorage.getItem('streak')) || 0;
      let lastDate = localStorage.getItem('lastDate');

      // 100% Guaranteed Sound Output
      function playSound(type) {
        try {
          let ctx = new (window.AudioContext || window.webkitAudioContext)();
          let osc = ctx.createOscillator();
          let gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, ctx.currentTime);
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
          } else if (type === 'wrong') {
            osc.frequency.setValueAtTime(220, ctx.currentTime);
            osc.frequency.setValueAtTime(180, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
          } else {
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
            osc.start();
            osc.stop(ctx.currentTime + 0.05);
          }
        } catch (e) {}
      }

      function updateStats() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('streak-val').innerText = streak;
      }

      function checkStreak() {
        let today = new Date().toDateString();
        if (lastDate !== today) {
          let yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          if (lastDate === yesterday.toDateString()) {
            streak++;
          } else {
            streak = 1;
          }
          localStorage.setItem('lastDate', today);
          localStorage.setItem('streak', streak);
        }
      }

      function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // होम स्क्रीन (500 लेवल्स का स्क्रॉल पाथ)
      window.loadLevelScreen = function() {
        checkStreak();
        updateStats();

        let pathHtml = `
          <div class="section-banner">
            <div class="banner-text">
              <h3>500 LEVELS JOURNEY</h3>
              <h1>Welcome to Deepak vocabulary.com</h1>
            </div>
            <div class="banner-logo">
              <img src="./logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3898/3898082.png'">
            </div>
          </div>
          <div class="path-container">
        `;

        for (let lvl = 1; lvl <= 500; lvl++) {
          let isUnlocked = (lvl === 1) || completedLevels.includes(lvl - 1);
          let offsetClass = `offset-${lvl % 8}`;

          pathHtml += `
            <div class="path-node-wrapper ${offsetClass}">
              <div class="path-node ${isUnlocked ? 'unlocked' : 'locked'}" onclick="startLevel(${lvl}, ${isUnlocked})">
                ${isUnlocked ? (completedLevels.includes(lvl) ? '⭐' : '📖') : '🔒'}
              </div>
              <div class="level-label">Lvl ${lvl}</div>
            </div>
          `;
        }

        pathHtml += `</div>`;
        document.getElementById('app').innerHTML = pathHtml;
      }

      window.startLevel = function(level, isUnlocked) {
        if (!isUnlocked) {
          playSound('wrong');
          alert(`🔒 Level ${level} लॉक है! पिछला लेवल पूरा करें।`);
          return;
        }
        playSound('click');
        currentLevel = level;
        currentWord = 0;
        loadWord();
      };

      function loadWord() {
        let wordData = levels[currentLevel][currentWord];
        let progress = (currentWord / 10) * 100;
        let shuffledOptions = shuffle(wordData.options);

        document.getElementById('app').innerHTML = `
          <div style="display: flex; align-items: center; gap: 15px;">
            <span onclick="loadLevelScreen()" style="font-size: 22px; cursor: pointer;">❌</span>
            <div class="quiz-progress-bg">
              <div class="quiz-progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>

          <div class="quiz-card">
            <p style="color: #afafaf; font-weight: 700; font-size: 13px;">LEVEL ${currentLevel} • WORD ${currentWord + 1}/10</p>
            <h1 class="word-display">${wordData.en}</h1>

            <div class="options-grid" id="options"></div>
          </div>
        `;

        let optionsDiv = document.getElementById('options');
        shuffledOptions.forEach(opt => {
          let btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerText = opt;
          btn.onclick = () => checkAnswer(opt, btn, wordData.hi);
          optionsDiv.appendChild(btn);
        });
      }

      window.checkAnswer = function(selected, btn, correct) {
        let buttons = document.querySelectorAll('#options button');
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correct) {
          score += 10;
          playSound('correct');
          btn.style.background = '#d7ffb8';
          btn.style.borderColor = '#58cc02';
          btn.style.color = '#58cc02';
          btn.style.boxShadow = '0 4px 0 #58cc02';
          setTimeout(() => { nextQ(); }, 1000);
        } else {
          playSound('wrong');
          btn.style.background = '#ffdadc';
          btn.style.borderColor = '#ff4b4b';
          btn.style.color = '#ff4b4b';
          btn.style.boxShadow = '0 4px 0 #ff4b4b';

          buttons.forEach(b => {
            if (b.innerText === correct) {
              b.style.background = '#d7ffb8';
              b.style.borderColor = '#58cc02';
              b.style.color = '#58cc02';
              b.style.boxShadow = '0 4px 0 #58cc02';
            }
          });
          setTimeout(() => { nextQ(); }, 1500);
        }
        localStorage.setItem('score', score);
        updateStats();
      };

      function nextQ() {
        currentWord++;
        if (currentWord >= levels[currentLevel].length) {
          if (!completedLevels.includes(currentLevel)) {
            completedLevels.push(currentLevel);
            localStorage.setItem('completedLevels', JSON.stringify(completedLevels));
          }
          playSound('correct');
          alert(`🎉 Level ${currentLevel} Complete! Next level unlocked!`);
          loadLevelScreen();
        } else {
          loadWord();
        }
      }

      loadLevelScreen();
    });
  </script>
</body>
</html>
