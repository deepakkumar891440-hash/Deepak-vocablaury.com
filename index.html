<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Quiz App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #fdfbf7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: #fdfbf7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }

        /* Header Styling */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Progress Bar */
        .quiz-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .close-btn {
            font-size: 24px;
            color: #ff5522;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .progress-bg {
            flex-grow: 1;
            height: 16px;
            background-color: #f3e5d8;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #ff5500;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* Quiz Main Area */
        .level-title {
            text-align: center;
            color: #ff5500;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .target-word {
            text-align: center;
            font-size: 42px;
            font-weight: 900;
            color: #222;
            margin-bottom: 40px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: #ffffff;
            border: 2px solid #f2dfce;
            border-radius: 18px;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #f2dfce;
            outline: none;
        }

        .option-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #f2dfce;
        }

        /* Answer States */
        .option-btn.correct {
            background-color: #4CAF50 !important;
            color: white !important;
            border-color: #388E3C !important;
            box-shadow: 0 4px 0 #2E7D32 !important;
        }

        .option-btn.wrong {
            background-color: #F44336 !important;
            color: white !important;
            border-color: #D32F2F !important;
            box-shadow: 0 4px 0 #C62828 !important;
        }

        /* Next Question Floating Button */
        .next-q-btn {
            margin-top: auto;
            background-color: #ff5500;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            box-shadow: 0 4px 0 #cc4400;
        }

        /* Level Completion Screen Styling */
        .completion-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        .trophy-img {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
        }

        .ribbon-banner {
            background: linear-gradient(180deg, #7c3aed 0%, #6d28d9 100%);
            color: white;
            font-size: 32px;
            font-weight: 900;
            padding: 12px 40px;
            border-radius: 20px;
            box-shadow: 0 6px 0 #4c1d95;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .completed-text {
            font-size: 36px;
            font-weight: 900;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .check-circle {
            width: 60px;
            height: 60px;
            background-color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.4);
        }

        .next-level-btn {
            background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #15803d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.1s;
        }

        .next-level-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #15803d;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- QUIZ VIEW -->
    <div id="quiz-view">
        <!-- Top Stats Bar -->
        <div class="top-bar">
            <span>🇮🇳</span>
            <div class="stats">
                <span class="stat-item">🔥 <span id="streak">1</span></span>
                <span class="stat-item">💎 <span id="gems">200</span></span>
                <span class="stat-item">❤️ <span id="hearts">5</span></span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="quiz-header">
            <span class="close-btn">&times;</span>
            <div class="progress-bg">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </div>

        <!-- Question Info -->
        <div class="level-title" id="level-title">LEVEL 1 • WORD 1/3</div>
        <div class="target-word" id="target-word">Book</div>

        <!-- Options -->
        <div class="options-container" id="options-container">
            <!-- Dynamically generated buttons -->
        </div>

        <!-- Continue Button -->
        <button class="next-q-btn" id="next-q-btn" onclick="loadNextQuestion()">Aage Badhein</button>
    </div>

    <!-- LEVEL COMPLETED VIEW -->
    <div class="completion-screen" id="completion-screen">
        <svg class="trophy-img" viewBox="0 0 200 200">
            <!-- Simple Trophy Graphic -->
            <path d="M50 40 L150 40 L140 110 C140 130 120 140 100 140 C80 140 60 130 60 110 Z" fill="#FFC107"/>
            <path d="M100 140 L100 170 M80 170 L120 170" stroke="#FFC107" stroke-width="12" stroke-linecap="round"/>
            <circle cx="100" cy="80" r="18" fill="#FFF"/>
        </svg>

        <div class="ribbon-banner" id="completed-level-text">Level 1</div>
        <div class="completed-text">Completed!</div>
        
        <div class="check-circle">✓</div>

        <button class="next-level-btn" onclick="startNextLevel()">
            Next Level ➔
        </button>
    </div>

</div>

<script>
    // Levels Data
    const levelsData = [
        {
            level: 1,
            words: [
                { word: "Book", options: ["बैग", "कलम", "कॉपी", "किताब"], correct: 3 },
                { word: "Pen", options: ["किताब", "कलम", "मेज़", "पेंसिल"], correct: 1 },
                { word: "Apple", options: ["आम", "केला", "सेब", "अंगूर"], correct: 2 }
            ]
        },
        {
            level: 2,
            words: [
                { word: "Water", options: ["दूध", "पानी", "चाय", "जूस"], correct: 1 },
                { word: "Sun", options: ["सूरज", "चांद", "तारे", "हवा"], correct: 0 }
            ]
        }
    ];

    let currentLevelIndex = 0;
    let currentWordIndex = 0;
    let canAnswer = true;

    // Elements
    const quizView = document.getElementById('quiz-view');
    const completionScreen = document.getElementById('completion-screen');
    const progressBar = document.getElementById('progress-bar');
    const levelTitle = document.getElementById('level-title');
    const targetWord = document.getElementById('target-word');
    const optionsContainer = document.getElementById('options-container');
    const nextQBtn = document.getElementById('next-q-btn');

    function loadQuestion() {
        canAnswer = true;
        nextQBtn.style.display = "none";
        
        const currentLevel = levelsData[currentLevelIndex];
        const currentData = currentLevel.words[currentWordIndex];

        // UI Updates
        levelTitle.innerText = `LEVEL ${currentLevel.level} • WORD ${currentWordIndex + 1}/${currentLevel.words.length}`;
        targetWord.innerText = currentData.word;
        
        // Progress Bar Calculation
        const progressPercent = ((currentWordIndex) / currentLevel.words.length) * 100;
        progressBar.style.width = `${progressPercent}%`;

        // Load Options
        optionsContainer.innerHTML = "";
        currentData.options.forEach((optText, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optText;
            btn.onclick = () => checkAnswer(index);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedIndex) {
        if (!canAnswer) return;
        canAnswer = false;

        const currentData = levelsData[currentLevelIndex].words[currentWordIndex];
        const buttons = optionsContainer.getElementsByClassName('option-btn');

        if (selectedIndex === currentData.correct) {
            // Right Answer - Green Color
            buttons[selectedIndex].classList.add('correct');
        } else {
            // Wrong Answer - Red Color
            buttons[selectedIndex].classList.add('wrong');
            // Show Right Answer - Green Color
            buttons[currentData.correct].classList.add('correct');
        }

        // Show Next Question Button
        nextQBtn.style.display = "block";
    }

    function loadNextQuestion() {
        const currentLevel = levelsData[currentLevelIndex];
        currentWordIndex++;

        if (currentWordIndex < currentLevel.words.length) {
            loadQuestion();
        } else {
            // Level Completed Screen Show
            showCompletionScreen();
        }
    }

    function showCompletionScreen() {
        progressBar.style.width = `100%`;
        quizView.style.display = "none";
        completionScreen.style.display = "flex";
        document.getElementById('completed-level-text').innerText = `Level ${levelsData[currentLevelIndex].level}`;
    }

    function startNextLevel() {
        currentLevelIndex++;
        
        // Check if more levels exist
        if (currentLevelIndex < levelsData.length) {
            currentWordIndex = 0;
            completionScreen.style.display = "none";
            quizView.style.display = "flex";
            loadQuestion();
        } else {
            alert("बधाई हो! आपने सभी लेवल पूरे कर लिए हैं!");
            // Reset to Level 1
            currentLevelIndex = 0;
            currentWordIndex = 0;
            completionScreen.style.display = "none";
            quizView.style.display = "flex";
            loadQuestion();
        }
    }

    // Initial Load
    loadQuestion();
</script>

</body>
</html>
