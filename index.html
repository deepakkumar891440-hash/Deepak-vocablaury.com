<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE Deepak Vocabulary</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #12071f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* मोबाइल ऐप कंटेनर */
    #mobile-container {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      background: #fbf8ff;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 35px rgba(124, 58, 237, 0.35);
      overflow: hidden;
    }

    /* 1. पांडा स्प्लैश स्क्रीन (Purple Theme - 2.5 Sec) */
    #splash-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      text-align: center;
      padding: 20px;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .panda-logo {
      width: 120px;
      height: 120px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 70px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      margin-bottom: 24px;
      animation: bouncePanda 1.5s infinite ease-in-out alternate;
    }

    @keyframes bouncePanda {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-12px) scale(1.05); }
    }

    .splash-title {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 1.4;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    /* 2. टॉप स्टैट्स बार */
    .top-stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 2px solid #e9d5ff;
      background: #ffffff;
      font-weight: 800;
      font-size: 16px;
      z-index: 20;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-item.flag { font-size: 22px; }
    .stat-item.streak { color: #7c3aed; }
    .stat-item.gems { color: #a855f7; }
    .stat-item.hearts { color: #ff3333; }

    /* स्क्रॉल होने वाला एरिया */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      padding-bottom: 90px;
      background: #fbf8ff;
    }

    /* 3. पर्पल वेलकम बैनर */
    .section-banner {
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      border-radius: 20px;
      padding: 20px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 0 #5b21b6;
      margin-bottom: 30px;
    }

    .banner-text h3 {
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.95;
      letter-spacing: 1.2px;
      color: #f3e8ff;
    }

    .banner-text h1 {
      font-size: 16px;
      margin-top: 4px;
      font-weight: 900;
      line-height: 1.3;
    }

    .banner-logo {
      width: 50px;
      height: 50px;
      background: #ffffff;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 4px 0 #5b21b6;
      flex-shrink: 0;
    }

    /* 4. लेवल्स पाथ लेआउट (Purple Theme) */
    .path-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 10px;
      padding-bottom: 20px;
    }

    .path-node-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .path-node {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
    }

    /* Unlocked Purple Node */
    .path-node.unlocked {
      background: #7c3aed;
      box-shadow: 0 8px 0 #5b21b6;
      color: white;
    }

    .path-node.unlocked:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #5b21b6;
    }

    /* 5th Level Reward Gift Node */
    .path-node.gift-node {
      background: linear-gradient(135deg, #a855f7, #c084fc) !important;
      box-shadow: 0 8px 0 #7e22ce !important;
      animation: giftBounce 1.4s infinite alternate;
    }

    @keyframes giftBounce {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    /* Locked Node */
    .path-node.locked {
      background: #e2e2e2;
      box-shadow: 0 8px 0 #b0b0b0;
      color: #a0a0a0;
      cursor: not-allowed;
    }

    .level-label {
      font-size: 12px;
      font-weight: 800;
      color: #5b21b6;
      margin-top: 6px;
    }

    /* S-Curve Offset */
    .offset-0 { transform: translateX(0px); }
    .offset-1 { transform: translateX(-40px); }
    .offset-2 { transform: translateX(-60px); }
    .offset-3 { transform: translateX(-40px); }
    .offset-4 { transform: translateX(0px); }
    .offset-5 { transform: translateX(40px); }
    .offset-6 { transform: translateX(60px); }
    .offset-7 { transform: translateX(40px); }

    /* क्विज UI */
    .quiz-card {
      text-align: center;
      padding-top: 10px;
    }

    .word-display {
      font-size: 38px;
      color: #2e1065;
      margin: 25px 0;
      font-weight: 900;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option-btn {
      background: #ffffff;
      border: 2px solid #e9d5ff;
      box-shadow: 0 4px 0 #e9d5ff;
      padding: 16px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      color: #4c1d95;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }

    .option-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #e9d5ff;
    }

    /* Correct/Wrong State Styling */
    .option-btn.correct-btn {
      background: #4CAF50 !important;
      border-color: #388E3C !important;
      color: #ffffff !important;
      box-shadow: 0 4px 0 #2E7D32 !important;
    }

    .option-btn.wrong-btn {
      background: #F44336 !important;
      border-color: #D32F2F !important;
      color: #ffffff !important;
      box-shadow: 0 4px 0 #C62828 !important;
    }

    .quiz-progress-bg {
      width: 100%;
      height: 14px;
      background: #f3e8ff;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0 20px 0;
    }

    .quiz-progress-fill {
      height: 100%;
      background: #7c3aed;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 10px;
    }

    /* जीत की स्क्रीन */
    .level-complete-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 10px;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .trophy-container {
      position: relative;
      margin-bottom: 20px;
    }

    .trophy-icon {
      font-size: 100px;
      filter: drop-shadow(0 8px 12px rgba(124, 58, 237, 0.35));
    }

    .purple-ribbon {
      background: linear-gradient(180deg, #6b21a8 0%, #581c87 100%);
      color: white;
      font-size: 32px;
      font-weight: 900;
      padding: 10px 45px;
      border-radius: 20px;
      box-shadow: 0 6px 0 #3b0764;
      margin-bottom: 10px;
      display: inline-block;
      letter-spacing: 0.5px;
    }

    .completed-title {
      font-size: 38px;
      font-weight: 900;
      color: #1f2937;
      margin-bottom: 25px;
    }

    .green-check-circle {
      width: 65px;
      height: 65px;
      background-color: #22c55e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 35px;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }

    .next-level-btn-green {
      width: 100%;
      background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
      color: white;
      border: none;
      padding: 18px;
      border-radius: 35px;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 #15803d;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform 0.1s ease;
    }

    .next-level-btn-green:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #15803d;
    }

    /* 5. बॉटम नेविगेशन बार */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65px;
      background: #ffffff;
      border-top: 2px solid #e9d5ff;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 20;
    }

    .nav-item {
      font-size: 24px;
      cursor: pointer;
      opacity: 0.5;
    }

    .nav-item.active {
      opacity: 1;
      transform: scale(1.15);
    }
  </style>
</head>

      // रैंडम 3 गलत विकल्प (Distractors) जनरेट करने का फंक्शन
      function generateOptions(correctAnswer) {
        let options = [correctAnswer];
        while (options.length < 4) {
          let randomMeaning = allHindiMeanings[Math.floor(Math.random() * allHindiMeanings.length)];
          if (!options.includes(randomMeaning)) {
            options.push(randomMeaning);
          }
        }
        return shuffleArray(options);
      }

      const levels = {};

      const TOTAL_WORDS = masterVocabList.length;

      for (let levelNum = 1; levelNum <= 500; levelNum++) {
        let levelWords = [];
        
        for (let w = 0; w < WORDS_PER_LEVEL; w++) {
          // Calculate a unique index using total pool count
          let wordIndex = ((levelNum - 1) * WORDS_PER_LEVEL + w) % TOTAL_WORDS;
          let wordObj = masterVocabList[wordIndex];
          
          levelWords.push({
            en: wordObj.en,
            hi: wordObj.hi,
            options: generateOptions(wordObj.hi)
          });
        }
        levels[levelNum] = levelWords;

      function speakWord(text) {

          window.speechSynthesis.cancel();
          let utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'hi-IN';
          utterance.rate = 0.9;
          utterance.pitch = 1.0;
          window.speechSynthesis.speak(utterance);
        }
      }

      // एरे को रैंडम/शफल करने का फंक्शन
      function shuffleArray(array) {
        let shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      }

      // साउंड इफेक्ट्स (Beep/Chime)
      function playSound(type) {
        try {
          let ctx = new (window.AudioContext || window.webkitAudioContext)();
          let osc = ctx.createOscillator();
          let gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          if (type === 'correct') {
            osc.frequency.setValueAtTime(659.25, ctx.currentTime);
            osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(1.0, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
          } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, ctx.currentTime);
            osc.frequency.setValueAtTime(120, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(1.0, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.45);
            osc.start();
            osc.stop(ctx.currentTime + 0.45);
          } else { // click
            osc.frequency.setValueAtTime(500, ctx.currentTime);
            gain.gain.setValueAtTime(0.6, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          }
        } catch (e) {}
      }

          localStorage.setItem('lastDate', today);
          localStorage.setItem('streak', streak);
        }
      }

      // होम लेवल पाथ (Purple Theme)
      window.loadLevelScreen = function() {
        checkStreak();
        updateStats();

        let pathHtml = `
          <!-- पर्पल बैनर + पांडा/बुक लोगो -->
          <div class="section-banner">
            <div class="banner-text">
              <h3>SECTION 1 • 500 LEVELS</h3>
              <h1>welcome to THE Deepak vocabulary.Com</h1>
            </div>
            <div class="banner-logo">
              🐼
            </div>
          </div>

          <!-- 500 लेवल्स पाथ -->
          <div class="path-container">
        `;

        for (let lvl = 1; lvl <= 500; lvl++) {
          let isUnlocked = (lvl === 1) || completedLevels.includes(lvl - 1);
          let offsetClass = `offset-${lvl % 8}`;
          let isGift = (lvl % 5 === 0);

          let nodeIcon = '🔒';
          if (isUnlocked) {
            if (completedLevels.includes(lvl)) {
              nodeIcon = '⭐';
            } else if (isGift) {
              nodeIcon = '🎁';
            } else {
              nodeIcon = '📖';
            }
          }

          pathHtml += `
            <div class="path-node-wrapper ${offsetClass}">
              <div class="path-node ${isUnlocked ? 'unlocked' : 'locked'} ${isGift && isUnlocked ? 'gift-node' : ''}" onclick="startLevel(${lvl}, ${isUnlocked}, ${isGift})">
                ${nodeIcon}
              </div>
              <div class="level-label">Lvl ${lvl} ${isGift ? '🎁' : ''}</div>
            </div>
          `;
        }

        pathHtml += `</div>`;
        document.getElementById('app').innerHTML = pathHtml;
      }

      window.startLevel = function(level, isUnlocked, isGift) {
        if (!isUnlocked) {
          playSound('wrong');
          alert(`🔒 Level ${level} लॉक है! पिछला लेवल पूरा करें।`);
          return;
        }
        playSound('click');
        currentLevel = level;
        currentWord = 0;
        loadWord();
      };

      function loadWord() {
        let wordData = levels[currentLevel][currentWord];
        let progress = (currentWord / levels[currentLevel].length) * 100;

        document.getElementById('app').innerHTML = `
          <div style="display: flex; align-items: center; gap: 15px;">
            <span onclick="loadLevelScreen()" style="font-size: 22px; cursor: pointer; font-weight: bold; color: #7c3aed;">✕</span>
            <div class="quiz-progress-bg">
              <div class="quiz-progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>

          <div class="quiz-card">
            <p style="color: #7c3aed; font-weight: 800; font-size: 13px;">LEVEL ${currentLevel} • WORD ${currentWord + 1}/${levels[currentLevel].length}</p>
            <h1 class="word-display">${wordData.en}</h1>

            <div class="options-grid" id="options"></div>
          </div>
        `;

        let optionsDiv = document.getElementById('options');
        
        // **विकल्पों को Shuffle किया जा रहा है**
        let randomizedOptions = shuffleArray(wordData.options);

        randomizedOptions.forEach(opt => {
          let btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerText = opt;
          btn.onclick = () => checkAnswer(opt, btn, wordData.hi);
          optionsDiv.appendChild(btn);
        });
      }

      window.checkAnswer = function(selected, btn, correct) {
        let buttons = document.querySelectorAll('#options button');
        buttons.forEach(b => b.style.pointerEvents = 'none');

        // **🔊 सही उत्तर बोलकर बताया जा रहा है**
        speakWord(correct);

        if (selected === correct) {
          score += 10;
          playSound('correct');
          btn.classList.add('correct-btn');
          setTimeout(() => { nextQ(); }, 1200);
        } else {
          playSound('wrong');
          btn.classList.add('wrong-btn');

          buttons.forEach(b => {
            if (b.innerText === correct) {
              b.classList.add('correct-btn');
            }
          });
          setTimeout(() => { nextQ(); }, 1800);
        }
        localStorage.setItem('score', score);
        updateStats();
      };

      function nextQ() {
        currentWord++;
        if (currentWord >= levels[currentLevel].length) {
          let isGiftLevel = (currentLevel % 5 === 0);
          if (!completedLevels.includes(currentLevel)) {
            completedLevels.push(currentLevel);
            if (isGiftLevel) {
              score += 50;
              localStorage.setItem('score', score);
            }
            localStorage.setItem('completedLevels', JSON.stringify(completedLevels));
          }
          playSound('correct');
          showLevelSuccessScreen();
        } else {
          loadWord();
        }
      }

      function showLevelSuccessScreen() {
        document.getElementById('app').innerHTML = `
          <div class="level-complete-card">
            <div class="trophy-container">
              <div class="trophy-icon">🏆</div>
            </div>

            <div class="purple-ribbon">Level ${currentLevel}</div>
            <div class="completed-title">Completed!</div>
            
            <div class="green-check-circle">✓</div>

            <button class="next-level-btn-green" onclick="goToNextLevel()">
              <span>Next Level</span>
              <span style="font-size: 28px;">❯</span>
            </button>
          </div>
        `;
      }

      window.goToNextLevel = function() {
        playSound('click');
        let nextLvl = currentLevel + 1;
        if (nextLvl <= 500) {
          startLevel(nextLvl, true, (nextLvl % 5 === 0));
        } else {
          loadLevelScreen();
        }
      };

      loadLevelScreen();
    });
  </script>
</body>
</html>
