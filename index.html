<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepak Vocabulary</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background-color: #1a0c00;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* मोबाइल ऐप कंटेनर */
    #mobile-container {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 30px rgba(255, 102, 0, 0.3);
      overflow: hidden;
    }

    /* 1. टॉप स्टैट्स बार (Orange Premium Look) */
    .top-stats-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 2px solid #ffe6d5;
      background: #ffffff;
      font-weight: 800;
      font-size: 16px;
      z-index: 20;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-item.flag { font-size: 22px; }
    .stat-item.streak { color: #ff6600; }
    .stat-item.gems { color: #ff9900; }
    .stat-item.hearts { color: #ff3333; }

    /* स्क्रॉल होने वाला एरिया */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      padding-bottom: 90px;
      background: #fffaf5;
    }

    /* 2. वेलकम बैनर (Bright Orange Theme) */
    .section-banner {
      background: linear-gradient(135deg, #ff6600, #ff8800);
      border-radius: 20px;
      padding: 20px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 0 #cc5200;
      margin-bottom: 30px;
    }

    .banner-text h3 {
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.95;
      letter-spacing: 1.2px;
      color: #ffe6d5;
    }

    .banner-text h1 {
      font-size: 18px;
      margin-top: 4px;
      font-weight: 900;
      line-height: 1.3;
    }

    .banner-logo {
      width: 55px;
      height: 55px;
      background: #ffffff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      box-shadow: 0 4px 0 #e65c00;
      flex-shrink: 0;
    }

    /* 3. 500 लेवल्स का Duolingo Style Path Layout */
    .path-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-top: 10px;
      padding-bottom: 20px;
    }

    .path-node-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .path-node {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s ease;
    }

    /* Unlocked Normal Node */
    .path-node.unlocked {
      background: #ff6600;
      box-shadow: 0 8px 0 #cc5200;
      color: white;
    }

    .path-node.unlocked:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #cc5200;
    }

    /* 5th Level Gift Node */
    .path-node.gift-node {
      background: #ff9900 !important;
      box-shadow: 0 8px 0 #cc7a00 !important;
      animation: bounce 1.5s infinite alternate;
    }

    @keyframes bounce {
      0% { transform: scale(1); }
      100% { transform: scale(1.08); }
    }

    /* Locked Node */
    .path-node.locked {
      background: #e5e5e5;
      box-shadow: 0 8px 0 #b5b5b5;
      color: #afafaf;
      cursor: not-allowed;
    }

    .level-label {
      font-size: 12px;
      font-weight: 800;
      color: #995226;
      margin-top: 6px;
    }

    /* S-Curve Offset */
    .offset-0 { transform: translateX(0px); }
    .offset-1 { transform: translateX(-40px); }
    .offset-2 { transform: translateX(-60px); }
    .offset-3 { transform: translateX(-40px); }
    .offset-4 { transform: translateX(0px); }
    .offset-5 { transform: translateX(40px); }
    .offset-6 { transform: translateX(60px); }
    .offset-7 { transform: translateX(40px); }

    /* क्विज UI */
    .quiz-card {
      text-align: center;
      padding-top: 10px;
    }

    .word-display {
      font-size: 38px;
      color: #2b1700;
      margin: 25px 0;
      font-weight: 900;
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .option-btn {
      background: #ffffff;
      border: 2px solid #ffd1b3;
      box-shadow: 0 4px 0 #ffd1b3;
      padding: 16px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      color: #4b2500;
      cursor: pointer;
      text-align: center;
      transition: all 0.1s;
    }

    .option-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #ffd1b3;
    }

    .quiz-progress-bg {
      width: 100%;
      height: 14px;
      background: #ffe6d5;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0 20px 0;
    }

    .quiz-progress-fill {
      height: 100%;
      background: #ff6600;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 10px;
    }

    /* 4. बॉटम नेविगेशन बार */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 65px;
      background: #ffffff;
      border-top: 2px solid #ffe6d5;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 20;
    }

    .nav-item {
      font-size: 24px;
      cursor: pointer;
      opacity: 0.5;
    }

    .nav-item.active {
      opacity: 1;
      transform: scale(1.15);
    }
  </style>
</head>
<body>

  <div id="mobile-container">
    
    <!-- 1. टॉप बार -->
    <div class="top-stats-bar">
      <div class="stat-item flag">🇮🇳</div>
      <div class="stat-item streak">🔥 <span id="streak-val">0</span></div>
      <div class="stat-item gems">💎 <span id="score-val">0</span></div>
      <div class="stat-item hearts">❤️ 5</div>
    </div>

    <!-- मुख्य कंटेंट बॉडी -->
    <div class="main-content" id="app"></div>

    <!-- 4. बॉटम नेविगेशन बार -->
    <div class="bottom-nav">
      <div class="nav-item active" onclick="loadLevelScreen()">🏠</div>
      <div class="nav-item">📦</div>
      <div class="nav-item">🏆</div>
      <div class="nav-item">❤️</div>
      <div class="nav-item">👤</div>
    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      // शब्दावली डेटाबेस
      const baseLevels = {
        1: [
          { en: "Apple", hi: "सेब", options: ["सेब", "केला", "आम", "अंगूर"] },
          { en: "Book", hi: "किताब", options: ["किताब", "कलम", "कॉपी", "बैग"] },
          { en: "Cat", hi: "बिल्ली", options: ["बिल्ली", "कुत्ता", "चूहा", "गाय"] },
          { en: "Dog", hi: "कुत्ता", options: ["कुत्ता", "बिल्ली", "घोड़ा", "शेर"] },
          { en: "Water", hi: "पानी", options: ["पानी", "चाय", "दूध", "जूस"] },
          { en: "Good", hi: "अच्छा", options: ["अच्छा", "बुरा", "सुंदर", "गंदा"] },
          { en: "Happy", hi: "खुश", options: ["खुश", "उदास", "गुस्सा", "डरा"] },
          { en: "House", hi: "घर", options: ["घर", "दुकान", "स्कूल", "अस्पताल"] },
          { en: "Eat", hi: "खाना", options: ["खाना", "पीना", "सोना", "खेलना"] },
          { en: "Flower", hi: "फूल", options: ["फूल", "पत्ता", "पेड़", "फल"] }
        ],
        2: [
          { en: "Beautiful", hi: "सुंदर", options: ["सुंदर", "बदसूरत", "छोटा", "बड़ा"] },
          { en: "Friend", hi: "दोस्त", options: ["दोस्त", "दुश्मन", "शिक्षक", "डॉक्टर"] },
          { en: "Money", hi: "पैसा", options: ["पैसा", "समय", "काम", "नाम"] },
          { en: "Family", hi: "परिवार", options: ["परिवार", "समाज", "देश", "दुनिया"] },
          { en: "Country", hi: "देश", options: ["देश", "शहर", "गांव", "राज्य"] },
          { en: "Health", hi: "स्वास्थ्य", options: ["स्वास्थ्य", "बीमारी", "दवा", "डॉक्टर"] },
          { en: "Education", hi: "शिक्षा", options: ["शिक्षा", "खेल", "नौकरी", "व्यापार"] },
          { en: "Travel", hi: "यात्रा", options: ["यात्रा", "घर", "खाना", "सोना"] },
          { en: "Success", hi: "सफलता", options: ["सफलता", "असफलता", "मेहनत", "भाग्य"] },
          { en: "Problem", hi: "समस्या", options: ["समस्या", "समाधान", "सवाल", "जवाब"] }
        ],
        3: [
          { en: "Ambition", hi: "महत्वाकांक्षा", options: ["महत्वाकांक्षा", "आलस्य", "डर", "खुशी"] },
          { en: "Develop", hi: "विकसित करना", options: ["विकसित करना", "खराब करना", "बनाना", "तोड़ना"] },
          { en: "Environment", hi: "पर्यावरण", options: ["पर्यावरण", "प्रदूषण", "जंगल", "नदी"] },
          { en: "Technology", hi: "प्रौद्योगिकी", options: ["प्रौद्योगिकी", "विज्ञान", "कला", "इतिहास"] },
          { en: "Opportunity", hi: "अवसर", options: ["अवसर", "समस्या", "चुनौती", "हार"] },
          { en: "Responsibility", hi: "जिम्मेदारी", options: ["जिम्मेदारी", "आजादी", "अधिकार", "कानून"] },
          { en: "Globalization", hi: "वैश्वीकरण", options: ["वैश्वीकरण", "स्थानीयकरण", "विकास", "पतन"] },
          { en: "Innovation", hi: "नवाचार", options: ["नवाचार", "नकल", "परंपरा", "रिवाज"] },
          { en: "Sustainable", hi: "टिकाऊ", options: ["टिकाऊ", "नाजुक", "मजबूत", "कमजोर"] },
          { en: "Leadership", hi: "नेतृत्व", options: ["नेतृत्व", "अनुसरण", "टीम", "कंपनी"] }
        ]
      };

      // 500 लेवल्स जनरेट करना
      const levels = {};
      const vocabularyPool = [
        { en: "Sun", hi: "सूरज", options: ["सूरज", "चांद", "तारा", "आकाश"] },
        { en: "Moon", hi: "चांद", options: ["चांद", "सूरज", "तारा", "हवा"] },
        { en: "Time", hi: "समय", options: ["समय", "काम", "दिन", "रात"] },
        { en: "City", hi: "शहर", options: ["शहर", "गांव", "देश", "राज्य"] },
        { en: "Love", hi: "प्यार", options: ["प्यार", "नफरत", "गुस्सा", "डर"] },
        { en: "Peace", hi: "शांति", options: ["शांति", "शोर", "युद्ध", "दुख"] },
        { en: "Freedom", hi: "आजादी", options: ["आजादी", "गुलामी", "कानून", "नियम"] },
        { en: "Wisdom", hi: "बुद्धिमत्ता", options: ["बुद्धिमत्ता", "मूर्खता", "ज्ञान", "सोच"] },
        { en: "Courage", hi: "साहस", options: ["साहस", "डर", "कायरता", "शक्ति"] },
        { en: "Truth", hi: "सत्य", options: ["सत्य", "झूठ", "पाप", "पुण्य"] }
      ];

      for (let i = 1; i <= 500; i++) {
        if (baseLevels[i]) {
          levels[i] = baseLevels[i];
        } else {
          levels[i] = vocabularyPool;
        }
      }

      let currentLevel = 1;
      let currentWord = 0;
      let score = parseInt(localStorage.getItem('score')) || 0;
      let completedLevels = JSON.parse(localStorage.getItem('completedLevels')) || [];
      let streak = parseInt(localStorage.getItem('streak')) || 0;
      let lastDate = localStorage.getItem('lastDate');

      // हाई-वॉल्यूम (तेज़ आवाज़) साउंड सिस्टम
      function playSound(type) {
        try {
          let ctx = new (window.AudioContext || window.webkitAudioContext)();
          let osc = ctx.createOscillator();
          let gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);

          if (type === 'correct') {
            osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
            osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1); // A5 High
            gain.gain.setValueAtTime(0.8, ctx.currentTime); // तेज़ आवाज़ (0.8)
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
            osc.start();
            osc.stop(ctx.currentTime + 0.35);
          } else if (type === 'wrong') {
            osc.type = 'sawtooth'; // बज़र साउंड
            osc.frequency.setValueAtTime(180, ctx.currentTime);
            osc.frequency.setValueAtTime(130, ctx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.8, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
            osc.start();
            osc.stop(ctx.currentTime + 0.4);
          } else { // click
            osc.frequency.setValueAtTime(450, ctx.currentTime);
            gain.gain.setValueAtTime(0.4, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
            osc.start();
            osc.stop(ctx.currentTime + 0.08);
          }
        } catch (e) {}
      }

      function updateStats() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('streak-val').innerText = streak;
      }

      function checkStreak() {
        let today = new Date().toDateString();
        if (lastDate !== today) {
          let yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          if (lastDate === yesterday.toDateString()) {
            streak++;
          } else {
            streak = 1;
          }
          localStorage.setItem('lastDate', today);
          localStorage.setItem('streak', streak);
        }
      }

      function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      // होम स्क्रीन (ऑरेंज थीम + गिफ्ट बॉक्स)
      window.loadLevelScreen = function() {
        checkStreak();
        updateStats();

        let pathHtml = `
          <!-- वेलकम बैनर + लोगो -->
          <div class="section-banner">
            <div class="banner-text">
              <h3>SECTION 1 • 500 LEVELS</h3>
              <h1>Welcome to Deepak vocabulary.com</h1>
            </div>
            <div class="banner-logo">
              📚
            </div>
          </div>

          <!-- 500 लेवल्स पाथ -->
          <div class="path-container">
        `;

        for (let lvl = 1; lvl <= 500; lvl++) {
          let isUnlocked = (lvl === 1) || completedLevels.includes(lvl - 1);
          let offsetClass = `offset-${lvl % 8}`;
          let isGift = (lvl % 5 === 0); // हर 5वें स्तर पर इनाम

          let nodeIcon = '🔒';
          if (isUnlocked) {
            if (completedLevels.includes(lvl)) {
              nodeIcon = '⭐';
            } else if (isGift) {
              nodeIcon = '🎁';
            } else {
              nodeIcon = '📖';
            }
          }

          pathHtml += `
            <div class="path-node-wrapper ${offsetClass}">
              <div class="path-node ${isUnlocked ? 'unlocked' : 'locked'} ${isGift && isUnlocked ? 'gift-node' : ''}" onclick="startLevel(${lvl}, ${isUnlocked}, ${isGift})">
                ${nodeIcon}
              </div>
              <div class="level-label">Lvl ${lvl} ${isGift ? '🎁' : ''}</div>
            </div>
          `;
        }

        pathHtml += `</div>`;
        document.getElementById('app').innerHTML = pathHtml;
      }

      window.startLevel = function(level, isUnlocked, isGift) {
        if (!isUnlocked) {
          playSound('wrong');
          alert(`🔒 Level ${level} लॉक है! पिछला लेवल पूरा करें।`);
          return;
        }
        playSound('click');
        currentLevel = level;
        currentWord = 0;
        loadWord();
      };

      function loadWord() {
        let wordData = levels[currentLevel][currentWord];
        let progress = (currentWord / 10) * 100;
        let shuffledOptions = shuffle(wordData.options);

        document.getElementById('app').innerHTML = `
          <div style="display: flex; align-items: center; gap: 15px;">
            <span onclick="loadLevelScreen()" style="font-size: 22px; cursor: pointer; font-weight: bold; color: #ff6600;">✕</span>
            <div class="quiz-progress-bg">
              <div class="quiz-progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>

          <div class="quiz-card">
            <p style="color: #ff8800; font-weight: 800; font-size: 13px;">LEVEL ${currentLevel} • WORD ${currentWord + 1}/10</p>
            <h1 class="word-display">${wordData.en}</h1>

            <div class="options-grid" id="options"></div>
          </div>
        `;

        let optionsDiv = document.getElementById('options');
        shuffledOptions.forEach(opt => {
          let btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerText = opt;
          btn.onclick = () => checkAnswer(opt, btn, wordData.hi);
          optionsDiv.appendChild(btn);
        });
      }

      window.checkAnswer = function(selected, btn, correct) {
        let buttons = document.querySelectorAll('#options button');
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (selected === correct) {
          score += 10;
          playSound('correct');
          btn.style.background = '#ffebd6';
          btn.style.borderColor = '#ff6600';
          btn.style.color = '#ff6600';
          btn.style.boxShadow = '0 4px 0 #ff6600';
          setTimeout(() => { nextQ(); }, 1000);
        } else {
          playSound('wrong');
          btn.style.background = '#ffdadc';
          btn.style.borderColor = '#ff4b4b';
          btn.style.color = '#ff4b4b';
          btn.style.boxShadow = '0 4px 0 #ff4b4b';

          buttons.forEach(b => {
            if (b.innerText === correct) {
              b.style.background = '#ffebd6';
              b.style.borderColor = '#ff6600';
              b.style.color = '#ff6600';
              b.style.boxShadow = '0 4px 0 #ff6600';
            }
          });
          setTimeout(() => { nextQ(); }, 1500);
        }
        localStorage.setItem('score', score);
        updateStats();
      };

      function nextQ() {
        currentWord++;
        if (currentWord >= levels[currentLevel].length) {
          let isGiftLevel = (currentLevel % 5 === 0);
          if (!completedLevels.includes(currentLevel)) {
            completedLevels.push(currentLevel);
            if (isGiftLevel) {
              score += 50; // गिफ्ट बोनस Gems
              localStorage.setItem('score', score);
            }
            localStorage.setItem('completedLevels', JSON.stringify(completedLevels));
          }
          playSound('correct');
          
          if (isGiftLevel) {
            alert(`🎉 बधाई हो! आपने Level ${currentLevel} पूरा किया और 🎁 Gift Box खोला! (+50 Bonus Gems)`);
          } else {
            alert(`🎉 Level ${currentLevel} Complete! अगला लेवल अनलॉक हो गया!`);
          }
          
          loadLevelScreen();
        } else {
          loadWord();
        }
      }

      loadLevelScreen();
    });
  </script>
</body>
</html>
